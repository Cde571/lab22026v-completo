name: CI-CD-LAB2026V

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-build-sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Ejecutar pruebas y cobertura
        run: mvn clean verify

      - name: Subir reporte de JaCoCo
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Análisis con SonarCloud
        if: ${{ secrets.SONAR_TOKEN != '' }}
        run: mvn sonar:sonar -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Empaquetar artefacto JAR
        run: mvn package -DskipTests

      - name: Subir artefacto JAR
        uses: actions/upload-artifact@v4
        with:
          name: lab2026v-jar
          path: target/*.jar

  docker-ecr:
    runs-on: ubuntu-latest
    needs: test-build-sonar
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Construir JAR
        run: mvn clean package -DskipTests

      - name: Construir imagen Docker
        run: docker build -t lab2026v:latest .

      - name: Configurar credenciales AWS
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login en Amazon ECR
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag y push de imagen a ECR
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' && secrets.ECR_REPOSITORY != '' }}
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: latest
        run: |
          docker tag lab2026v:latest $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
